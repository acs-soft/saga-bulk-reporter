name: Track downloads

# Refreshes the two counters the landing page shows as hero stats:
#   metrics/downloads.* — cumulative GitHub Releases downloads
#   metrics/usage.*     — cumulative `report_run` events from PostHog
# Both are kept as a CSV time series because neither source stores one for us:
# the Releases API only exposes a running total, and PostHog's free-tier event
# retention eventually ages out the raw events behind the count.
#
# Running more than once a day does not distort that series: each run drops the
# existing row for today before appending, so the CSV stays one row per day and
# only the JSON the page reads gets fresher.

on:
  schedule:
    # Every 4 hours (00/04/08/12/16/20 UTC). GitHub queues scheduled runs and
    # can delay them by an hour or more, which is harmless at this spacing but
    # is why an hourly schedule would not reliably deliver 24 runs.
    - cron: '0 */4 * * *'
  workflow_dispatch:          # manual "Run workflow" button

permissions:
  contents: write             # required to commit the updated CSV back

jobs:
  track:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Append today's total to the CSV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Sum download_count across every asset of every release (all pages).
          counts=$(gh api --paginate "repos/${{ github.repository }}/releases" \
            --jq '.[].assets[].download_count')
          total=$(printf '%s\n' "$counts" | awk '{ s += $1 } END { print s + 0 }')
          today=$(date -u +%Y-%m-%d)

          file=metrics/downloads.csv
          mkdir -p metrics
          [ -f "$file" ] || echo "date,total_downloads" > "$file"

          # Idempotent: drop any existing row for today, then add the fresh one
          # (so a manual re-run on the same day overwrites rather than dupes).
          { grep -v "^${today}," "$file" || true; } > "$file.tmp"
          mv "$file.tmp" "$file"
          echo "${today},${total}" >> "$file"

          # The landing page reads this same-origin (no per-visitor GitHub API
          # call). Deploying this commit refreshes the number live on the site.
          printf '{"date":"%s","total":%s}\n' "$today" "$total" > metrics/downloads.json

          echo "Logged ${total} downloads for ${today}."

      - name: Append today's report count to the CSV
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
        run: |
          # Reads the all-time `report_run` count from PostHog (EU cloud). This
          # needs a PERSONAL API key with the `query:read` scope — the phc_ key
          # embedded in index.html is ingest-only and cannot read anything back.
          #
          # Every failure path below exits 0 without touching metrics/usage.*,
          # so a PostHog outage leaves the live badge showing the last good
          # number instead of dropping it to zero or hiding it.
          if [ -z "$POSTHOG_API_KEY" ] || [ -z "$POSTHOG_PROJECT_ID" ]; then
            echo "PostHog secrets not configured — skipping report count."
            exit 0
          fi

          # NOTE: PostHog's "filter out internal and test users" toggle is a UI
          # setting backed by project-level test-account filters; it does NOT
          # apply to raw HogQL. To exclude your own machines, add a clause here:
          #   AND distinct_id NOT IN ('id-a', 'id-b')
          body=$(jq -n --arg q "SELECT count() FROM events WHERE event = 'report_run'" \
            '{query: {kind: "HogQLQuery", query: $q}}')

          http=$(curl -sS -o resp.json -w '%{http_code}' \
            -X POST "https://eu.posthog.com/api/projects/${POSTHOG_PROJECT_ID}/query/" \
            -H "Authorization: Bearer ${POSTHOG_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "$body") || { echo "PostHog request failed — keeping previous count."; exit 0; }

          if [ "$http" != "200" ]; then
            echo "PostHog query returned HTTP ${http} — keeping previous count."
            cat resp.json
            exit 0
          fi

          reports=$(jq -r '.results[0][0] // empty' resp.json)
          case "$reports" in
            ''|*[!0-9]*)
              echo "Unexpected PostHog response — keeping previous count."
              cat resp.json
              exit 0
              ;;
          esac

          today=$(date -u +%Y-%m-%d)
          file=metrics/usage.csv
          mkdir -p metrics
          [ -f "$file" ] || echo "date,reports_run" > "$file"

          # Idempotent, same as the downloads CSV above: drop today's row first
          # so a manual re-run overwrites rather than duplicates.
          { grep -v "^${today}," "$file" || true; } > "$file.tmp"
          mv "$file.tmp" "$file"
          echo "${today},${reports}" >> "$file"

          printf '{"date":"%s","reports":%s}\n' "$today" "$reports" > metrics/usage.json
          rm -f resp.json

          echo "Logged ${reports} reports run for ${today}."

      - name: Commit if the metrics changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/downloads.csv metrics/downloads.json
          git add metrics/usage.csv metrics/usage.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No change to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: log usage metrics"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # The push above uses GITHUB_TOKEN, which by design does NOT trigger the
  # Deploy workflow's `push` event. So call it directly here to push the fresh
  # metrics/downloads.json to the live server. Only runs when the count changed.
  deploy:
    needs: track
    if: needs.track.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
