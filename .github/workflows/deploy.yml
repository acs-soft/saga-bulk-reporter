name: Deploy to server

# Syncs the static landing page to the production server (bulkreporter.ro) on
# every push to main. nginx serves the files live from a bind-mounted directory,
# so no rebuild or restart is needed — rsync is the whole deploy.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'brand/_src/**'
      - '.github/workflows/track-downloads.yml'
  workflow_dispatch:
  # Callable from other workflows in this repo (e.g. track-downloads after it
  # commits a fresh metrics/downloads.json). A commit pushed with the default
  # GITHUB_TOKEN does NOT trigger the `push` event above, so those workflows
  # must invoke this one directly via `uses:` instead of relying on the push.
  workflow_call:

# Never let two deploys race; a newer push supersedes an in-flight one.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Always deploy the current tip of main. When called via workflow_call
      # right after a commit, the run's github.sha still points at the OLD tip,
      # so pin the branch explicitly to pick up the just-pushed file.
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Rsync site to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='brand/_src' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/deployer/bulkreporter/site/"
